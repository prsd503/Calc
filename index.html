<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChromaCal PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff007f">    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b, #311042);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 10px;
        }

        .phone-container {
            width: 100%;
            max-width: 410px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Display Screen */
        .screen {
            padding: 30px 25px 20px 25px;
            text-align: right;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 160px;
            background: rgba(0, 0, 0, 0.2);
        }

        .history-expr {
            font-size: 1.1rem;
            color: #a5b4fc;
            min-height: 1.5rem;
            word-wrap: break-word;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .main-display {
            font-size: 3rem;
            font-weight: 300;
            overflow-x: auto;
            white-space: nowrap;
            color: #fff;
        }

        /* Action Bar */
        .action-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .action-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        /* Grid Pad */
        .pad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            padding: 20px;
        }

        button {
            border: none;
            outline: none;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.1s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        button:active {
            transform: scale(0.92);
            filter: brightness(1.2);
        }

        /* Color Coding for UI Experience */
        .btn-number {
            background: rgba(255, 255, 255, 0.08);
            color: #f8fafc;
        }
        .btn-number:active { background: rgba(255, 255, 255, 0.2); }

        .btn-operator {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: #fff;
        }

        .btn-utility {
            background: rgba(255, 255, 255, 0.15);
            color: #f43f5e;
        }

        .btn-equal {
            background: linear-gradient(135deg, #d946ef, #a21caf);
            color: #fff;
            grid-column: span 2;
        }

        /* Saved Results Section */
        .saved-section {
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .saved-header {
            padding: 12px 20px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-weight: 700;
        }

        .saved-list {
            overflow-y: auto;
            flex-grow: 1;
            padding: 5px 15px;
        }

        .saved-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            margin: 6px 0;
            padding: 10px 14px;
            border-radius: 12px;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .saved-value {
            font-weight: 600;
            color: #38bdf8;
            cursor: pointer;
            font-size: 1.1rem;
            transition: color 0.2s;
        }

        .saved-value:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 50%;
        }
        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Custom Scrollbar for list and screen */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="phone-container">
    <div class="screen">
        <div class="history-expr" id="history"></div>
        <div class="main-display" id="display">0</div>
    </div>

    <div class="action-bar">
        <span style="color: #94a3b8; font-size: 0.85rem; align-self: center;">ChromaCal</span>
        <button class="action-btn" onclick="saveCurrentResult()">↓ Save Result</button>
    </div>

    <div class="pad">
        <button class="btn-utility" onclick="clearAll()">AC</button>
        <button class="btn-utility" onclick="deleteLast()">⌫</button>
        <button class="btn-operator" onclick="appendOperator('%')">%</button>
        <button class="btn-operator" onclick="appendOperator('/')">÷</button>

        <button class="btn-number" onclick="appendNumber('7')">7</button>
        <button class="btn-number" onclick="appendNumber('8')">8</button>
        <button class="btn-number" onclick="appendNumber('9')">9</button>
        <button class="btn-operator" onclick="appendOperator('*')">×</button>

        <button class="btn-number" onclick="appendNumber('4')">4</button>
        <button class="btn-number" onclick="appendNumber('5')">5</button>
        <button class="btn-number" onclick="appendNumber('6')">6</button>
        <button class="btn-operator" onclick="appendOperator('-')">−</button>

        <button class="btn-number" onclick="appendNumber('1')">1</button>
        <button class="btn-number" onclick="appendNumber('2')">2</button>
        <button class="btn-number" onclick="appendNumber('3')">3</button>
        <button class="btn-operator" onclick="appendOperator('+')">+</button>

        <button class="btn-number" onclick="appendNumber('0')">0</button>
        <button class="btn-number" onclick="appendNumber('.')">.</button>
        <button class="btn-equal" onclick="calculate()">=</button>
    </div>

    <div class="saved-section">
        <div class="saved-header">Saved Values (Tap to use)</div>
        <div class="saved-list" id="savedList">
            </div>
    </div>
</div>

<script>
    let currentInput = '0';
    let previousExpression = '';
    let isCalculationDone = false;
    let savedResults = JSON.parse(localStorage.getItem('calc_saved_results')) || [];

    const displayEl = document.getElementById('display');
    const historyEl = document.getElementById('history');
    const savedListEl = document.getElementById('savedList');

    function updateDisplay() {
        displayEl.innerText = currentInput;
        historyEl.innerText = previousExpression;
        displayEl.scrollLeft = displayEl.scrollWidth;
    }

    function appendNumber(num) {
        if (isCalculationDone) {
            currentInput = num === '.' ? '0.' : num;
            isCalculationDone = false;
        } else {
            if (currentInput === '0' && num !== '.') {
                currentInput = num;
            } else {
                if (num === '.' && currentInput.includes('.')) {
                    const tokens = currentInput.split(/[\+\-\*\/%]/);
                    if (tokens[tokens.length - 1].includes('.')) return;
                }
                currentInput += num;
            }
        }
        updateDisplay();
    }

    function appendOperator(op) {
        if (isCalculationDone) isCalculationDone = false;
        
        const lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) {
            currentInput = currentInput.slice(0, -1) + op;
        } else {
            currentInput += op;
        }
        updateDisplay();
    }

    function clearAll() {
        currentInput = '0';
        previousExpression = '';
        isCalculationDone = false;
        updateDisplay();
    }

    function deleteLast() {
        if (isCalculationDone) {
            clearAll();
            return;
        }
        if (currentInput.length > 1) {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput = '0';
        }
        updateDisplay();
    }

    function parsePercentages(expr) {
        // Find numbers followed by % that are chained to an addition/subtraction/multiplication/division context
        // Matches structures like: (BaseNumber)(Operator)(PercentNumber)%
        const regex = /(\d+(?:\.\d+)?)\s*([\+\-\*\/])\s*(\d+(?:\.\d+)?)%/g;
        
        let dynamicExpr = expr;
        let match;
        
        // Loop to compute real value for standard context percentages (e.g., 10 + 10%)
        while ((match = regex.exec(dynamicExpr)) !== null) {
            const baseNum = parseFloat(match[1]);
            const operator = match[2];
            const percentNum = parseFloat(match[3]);
            
            let percentageValue;
            if (operator === '+' || operator === '-') {
                // For adding/subtracting percentage, find the base amount value
                percentageValue = baseNum * (percentNum / 100);
            } else {
                // For multiplication/division, process directly as a fractional decimal representation
                percentageValue = percentNum / 100;
            }
            
            const targetedString = match[0];
            const replacementString = `${baseNum}${operator}${percentageValue}`;
            dynamicExpr = dynamicExpr.replace(targetedString, replacementString);
            
            // Reset regex search point because the string length changed
            regex.lastIndex = 0;
        }
        
        // Fallback catch-all for lone percentages (e.g. "50%")
        dynamicExpr = dynamicExpr.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
        
        return dynamicExpr;
    }

    function calculate() {
        try {
            let expression = currentInput;
            previousExpression = expression + ' =';
            
            // Format cross/division signs safely
            let sanitized = expression.replace(/×/g, '*').replace(/÷/g, '/');
            
            // Apply advanced look-back consumer percentage parsing rules
            sanitized = parsePercentages(sanitized);
            
            let result = Function(`"use strict"; return (${sanitized})`)();
            
            if (result % 1 !== 0) {
                result = parseFloat(result.toFixed(8));
            }
            
            currentInput = String(result);
            isCalculationDone = true;
            updateDisplay();
        } catch (error) {
            currentInput = 'Error';
            isCalculationDone = true;
            updateDisplay();
        }
    }

    // Saved Items Functions
    function renderSavedList() {
        savedListEl.innerHTML = '';
        if(savedResults.length === 0) {
            savedListEl.innerHTML = `<div style="color:#64748b; font-size:0.85rem; padding:10px; text-align:center;">No saved results yet.</div>`;
            return;
        }
        savedResults.forEach((val, index) => {
            const div = document.createElement('div');
            div.className = 'saved-item';
            div.innerHTML = `
                <span class="saved-value" onclick="useSavedValue('${val}')">${val}</span>
                <button class="delete-btn" onclick="deleteSavedValue(${index})">✕</button>
            `;
            savedListEl.appendChild(div);
        });
    }

    function saveCurrentResult() {
        const lastChar = currentInput.slice(-1);
        if (['+', '-', '*', '/', '%'].includes(lastChar)) return;
        
        if (!isCalculationDone && currentInput !== '0' && currentInput !== 'Error') {
            calculate();
        }

        const valueToSave = currentInput;
        if(valueToSave === 'Error' || valueToSave === '0') return;

        if(!savedResults.includes(valueToSave)) {
            savedResults.unshift(valueToSave);
            localStorage.setItem('calc_saved_results', JSON.stringify(savedResults));
            renderSavedList();
        }
    }

    function useSavedValue(value) {
        if (currentInput === '0' || isCalculationDone) {
            currentInput = value;
            isCalculationDone = false;
        } else {
            currentInput += value;
        }
        updateDisplay();
    }

    function deleteSavedValue(index) {
        savedResults.splice(index, 1);
        localStorage.setItem('calc_saved_results', JSON.stringify(savedResults));
        renderSavedList();
    }

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker Registered Successfully!'))
                .catch(err => console.log('Service Worker Registration Failed', err));
        });
    }

    renderSavedList();
</script>
</body>
</html>
